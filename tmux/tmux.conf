# ── theme ──────────────────────────────────────────────────────────
set -g @theme "dark"
source-file "~/.config/tmux/themes/catppuccin-mocha.conf"

# ── general ────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -g window-size        latest

set -g history-limit 99999
set -g display-time  4000
set -g escape-time    0
set -g focus-events   on

set -g mouse          on
set -g set-clipboard  on

set -g aggressive-resize on
set -g allow-rename      on
set -g automatic-rename-format "#{pane_current_command}"
set -wg automatic-rename on

# ── indexing ───────────────────────────────────────────────────────
set -g base-index      1
set -g pane-base-index 1
set -g renumber-windows on

# ── status bar ─────────────────────────────────────────────────────
set -g status-interval  1
set -g status-position  top
set -g status-style     "bg=default"
set -g status-justify   "absolute-centre"

set -g  status-left-length  100
set -g  status-right-length 100

# ── prefix ─────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── keybindings ────────────────────────────────────────────────────
unbind c
bind n new-window -c "#{pane_current_path}"

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

setw -g mode-keys vi
bind r source-file "~/.config/tmux/tmux.conf" \; display "reloaded"
bind T run-shell   "~/.config/tmux/themes/toggle.sh"
bind x kill-pane

# ── status left ────────────────────────────────────────────────────
set -g status-left ""

set -ga status-left "#{?client_prefix,#{#[bg=#{@theme_red},fg=#{@theme_bg},bold]  #S },#{#[bg=default,fg=#{@theme_green}]  #S }}"
set -ga status-left "#[bg=default,fg=#{@theme_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@theme_maroon}]  #{=-24/...:#{pane_current_command}} "
set -ga status-left "#[bg=default,fg=#{@theme_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@theme_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@theme_yellow},none]#{?window_zoomed_flag, [Z],}"

# ── status right ───────────────────────────────────────────────────
set -g status-right ""

set -ga status-right "#[bg=default,fg=#{@theme_overlay_0},none]│"
set -ga status-right "#[bg=default]#{?#{==:#{online_status},ok},#[fg=#{@theme_mauve}] 󰖩 on ,#[fg=#{@theme_red},bold]#[reverse] 󰖪 off }"
set -ga status-right "#[bg=default,fg=#{@theme_overlay_0},none]│"
set -ga status-right "#[bg=default,fg=#{@theme_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# ── pane borders ───────────────────────────────────────────────────
setw -g pane-border-lines single
setw -g pane-border-status top
setw -g pane-border-format ""

setw -g pane-active-border-style "bg=default,fg=#{@theme_overlay_0}"
setw -g pane-border-style        "bg=default,fg=#{@theme_surface_0}"

# ── window status ──────────────────────────────────────────────────
set -g  window-status-format         " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g  window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "

set -g  window-status-style          "bg=default,fg=#{@theme_rosewater}"
set -g  window-status-last-style     "bg=default,fg=#{@theme_peach}"
set -g  window-status-activity-style "bg=#{@theme_red},fg=#{@theme_bg}"
set -g  window-status-bell-style     "bg=#{@theme_red},fg=#{@theme_bg},bold"
set -g  window-status-current-style  "bg=#{@theme_peach},fg=#{@theme_bg},bold"

set -gF window-status-separator "#[bg=default,fg=#{@theme_overlay_0}]│"

# ── plugins ────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-online-status'

set -g @online_icon  "ok"
set -g @offline_icon "nok"

run '~/.config/tmux/plugins/tpm/tpm'
